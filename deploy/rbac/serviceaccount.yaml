# The identity ray-mcp runs as in-cluster. The agent that drives ray-mcp inherits
# this ServiceAccount's RBAC, so this SA + its binding ARE the entire security
# envelope for an autonomous caller: "RBAC is the floor" (spec Q12, grilling #7).
#
# Namespace: left as `default` so `kubectl apply -k deploy/rbac/` works out of the
# box. The installer is expected to override this (kustomize `namespace:`, Helm
# later, or edit) to wherever ray-mcp actually runs. The ClusterRoleBinding below
# references this same namespace/name pair, so change both together if you move it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ray-mcp
  namespace: default
